<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kartu Ucapan Ulang Tahun</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }

    body, html {
      height: 100%;
    }

    .background {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      opacity: 0.5;
      z-index: -2;
    }

    .background img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      background: rgba(236, 187, 204, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.4);
      animation: fadeInUp 1s ease;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #333;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #e2abbc;
      color: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .background { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 32px; }
      p { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="background">
    <img src="./IMG/gambar_1.jpeg ">
    <img src="./IMG/gambar_3.jpeg">
    <img src="./IMG/gambar_2.jpeg">
  </div>

  <div class="overlay"></div>

  <div class="container">
    <div class="card">

      <h1><span>🎉</span>Selamat Ulang Tahun, <br>SAYANGGGGG!!!<span>🎂</span></h1>
      <!-- <p>🎉 Selamat Ulang Tahun, <br><span id="name">Nur Wijayanti Kusuma</span>! 🎂</p> -->

      <p>
        Semoga diumur 26 Tahun ini, segala doa dan harapan sayanggg terwujud.
        Semoga ayangg makin bahagia, sehat selalu, dan semakin sukses .
      </p>

      <p>
        Terima kasih sayanggg sudah hadir dalam hidupku.
      </p>

      <h2>I LOVE YOUUUUU ❤️❤️❤️</h2>
  </div>
</body>
</html>
